<!DOCTYPE html>
<html>
<body>

    <h2>Start Timelapse</h2>
    <form action="{{ url_for("timelapse")}}" method="post">

      <label for="lastname">Interval between pictures(seconds):</label>

    </form>
</body>
</html>
